<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosgrove Family Seder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a00;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 70%, #3d1a00 0%, #1a0a00 60%, #0d0500 100%);
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff8e7;
    border-radius: 50%;
    animation: twinkle 3s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 0.9; }
  }

  .scene {
    position: relative;
    z-index: 1;
    width: 820px;
    max-width: 98vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 10px;
  }

  .title-block {
    text-align: center;
    margin-bottom: 18px;
    animation: fadeDown 1.2s ease both;
  }
  .hebrew-star {
    font-size: 2rem;
    color: #c9a84c;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 8px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    color: #f5d98b;
    letter-spacing: 2px;
    line-height: 1.1;
    text-shadow: 0 0 30px #c9892090, 0 2px 8px #000;
  }
  h1 span {
    font-style: italic;
    color: #e8b84b;
  }
  .subtitle {
    font-size: 1rem;
    color: #c9a84caa;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .table-wrap {
    width: 100%;
    animation: fadeIn 1.8s ease 0.3s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .location-legend {
    display: flex;
    gap: 18px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeIn 2s ease 0.8s both;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.85rem;
    color: #e8c97a;
    letter-spacing: 1px;
  }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid #c9a84c88;
  }

  .bottom-text {
    margin-top: 14px;
    font-style: italic;
    color: #c9a84c88;
    font-size: 0.85rem;
    letter-spacing: 2px;
    animation: fadeIn 2s ease 1.2s both;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; transform: scaleY(1) scaleX(1); }
    25% { opacity: 0.85; transform: scaleY(1.05) scaleX(0.95); }
    50% { opacity: 0.95; transform: scaleY(0.97) scaleX(1.02); }
    75% { opacity: 0.9; transform: scaleY(1.03) scaleX(0.98); }
  }
  .flame  { animation: flicker 1.5s ease-in-out infinite; transform-origin: bottom center; }
  .flame2 { animation: flicker 1.7s ease-in-out 0.3s infinite; transform-origin: bottom center; }
  .flame3 { animation: flicker 1.3s ease-in-out 0.6s infinite; transform-origin: bottom center; }
  .flame4 { animation: flicker 1.9s ease-in-out 0.1s infinite; transform-origin: bottom center; }
  .flame5 { animation: flicker 1.4s ease-in-out 0.9s infinite; transform-origin: bottom center; }
  .flame6 { animation: flicker 1.6s ease-in-out 0.5s infinite; transform-origin: bottom center; }
</style>
</head>
